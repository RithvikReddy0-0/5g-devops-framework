apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-server
  template:
    metadata:
      labels:
        app: traffic-server
    spec:
      containers:
      - name: server
        image: traffic-server:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-server-service
spec:
  selector:
    app: traffic-server
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
