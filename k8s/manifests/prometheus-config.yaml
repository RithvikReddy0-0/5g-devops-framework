apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 2s

    scrape_configs:
      - job_name: 'traffic-server'
        metrics_path: /metrics
        static_configs:
          - targets: ['traffic-server-service:5000']
